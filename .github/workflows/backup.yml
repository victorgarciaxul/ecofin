name: Backup Supabase

on:
  schedule:
    # Semanal: todos los lunes a las 03:00 UTC
    - cron: '0 3 * * 1'
    # Mensual: el día 1 de cada mes a las 03:30 UTC
    - cron: '30 3 1 * *'
  workflow_dispatch: # permite ejecutarlo manualmente desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set timestamp and type
        id: meta
        run: |
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          DAY=$(date -u +"%d")
          # Si es día 1 es backup mensual, si no semanal
          if [ "$DAY" = "01" ]; then
            TYPE="mensual"
          else
            TYPE="semanal"
          fi
          echo "ts=$TS"        >> $GITHUB_OUTPUT
          echo "type=$TYPE"    >> $GITHUB_OUTPUT
          echo "dir=backups/$TYPE/$TS" >> $GITHUB_OUTPUT

      - name: Export eco_proyectos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p "${{ steps.meta.outputs.dir }}"
          curl -sf \
            "$SUPABASE_URL/rest/v1/eco_proyectos?select=*" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Accept: application/json" \
            -o "${{ steps.meta.outputs.dir }}/eco_proyectos.json"
          echo "eco_proyectos exportado: $(wc -c < "${{ steps.meta.outputs.dir }}/eco_proyectos.json") bytes"

      - name: Export eco_entradas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sf \
            "$SUPABASE_URL/rest/v1/eco_entradas?select=*" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Accept: application/json" \
            -o "${{ steps.meta.outputs.dir }}/eco_entradas.json"
          echo "eco_entradas exportado: $(wc -c < "${{ steps.meta.outputs.dir }}/eco_entradas.json") bytes"

      - name: Write manifest
        run: |
          cat > "${{ steps.meta.outputs.dir }}/manifest.json" <<EOF
          {
            "timestamp": "${{ steps.meta.outputs.ts }}",
            "type": "${{ steps.meta.outputs.type }}",
            "tables": ["eco_proyectos", "eco_entradas"]
          }
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "backup: ${{ steps.meta.outputs.type }} ${{ steps.meta.outputs.ts }}"
          git push origin main
